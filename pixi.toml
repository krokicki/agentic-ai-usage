[workspace]
name = "agentic-ai-usage"
description = "Charts summarizing AI coding-agent (Claude Code, Codex, ...) usage"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11"
matplotlib-base = ">=3.9"
numpy = ">=1.26"

[tasks]
all = "python analyze.py all"
monthly = "python analyze.py monthly"
daily = "python analyze.py daily"
rolling = "python analyze.py rolling"
projects = "python analyze.py projects"
tokentype = "python analyze.py tokentype"
cost = "python analyze.py cost"
